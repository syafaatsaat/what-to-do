<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>what to-do</title>

    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=delete,edit" />
</head>
<body>
    <div id="container">
        <div id="projects">
            <h1>Projects</h1>
            <button id="new-project-btn">New Project</button>
            <div id="project-list">
            </div>
        </div>
        <div id="navbar">
            <div id="project-controls">
                <h2>Project Title</h2>
                <button>New Task</button>
            </div>
            <div>
                <p>Img</p>
                <p>User</p>
            </div>
        </div>
        <div id="tasks">
            <p>No task for now :)</p>
        </div>
        <div id="description">
            <h2>Description</h2>
        </div>
        <div id="footer">
            <p>Made by syafaat_saat</p>
        </div>
    </div>
    <dialog id="project-dialog">
        <form id="project-form" class="project-form">
            <h1>New Project</h1>
            <input type="hidden" name="projectID" id="hidden-project-id">
            <div class="form-col">
                <label for="title">Title</label>
                <input type="text" id="title" name="title"
                placeholder="New Project">
            </div>
            <div class="form-row">
                <button id="cancel-project-btn">Cancel</button>
                <button id="create-project-btn">Create</button>
            </div>
        </form>
    </dialog>
    <dialog id="task-dialog">
        <form id="task-form" class="task-form">
            <h1>New Task</h1>
            <input type="hidden" name="taskID" id="hidden-task-id">
            <div class="form-col">
                <label for="title">Title</label>
                <input type="text" id="title" name="title"
                placeholder="New Task">
            </div>
            <div class="form-col">
                <label for="description">Description</label>
                <input type="text" id="description" 
                name="description">
            </div>
            <div class="form-row">
                <div class="form-col">
                    <label for="duedate">Due Date</label>
                    <input type="date" id="duedate" name="duedate">
                </div>
                <div class="form-col">
                    <label for="priority">Priority</label>
                    <select name="priority" id="priority">
                        <option value="low">Low</option>
                        <option value="medium">Medium</option>
                        <option value="high">High</option>
                    </select>
                </div>
            </div>
            <div class="form-row">
                <button>Cancel</button>
                <button>Create</button>
            </div>
        </form>
    </dialog>
</body>
</html>
