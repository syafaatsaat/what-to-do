<!doctype html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>what to-do</title><link rel="preconnect" href="https://fonts.googleapis.com"/><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/><link href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&display=swap" rel="stylesheet"/><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20,400,0,0&icon_names=add_box,calendar_clock,check_box,delete,edit"/><script defer="defer" src="main.js"></script></head><body><div id="container"><div id="projects"><h1>Projects</h1><button id="new-project-btn"><span class="material-symbols-outlined">add_box</span> New Project</button><div id="project-list"></div></div><div id="navbar"><div id="project-controls"><h2 id="current-project"></h2><button id="new-task-btn" disabled="disabled" hidden>New Task</button></div><div id="user-info"><img src="b933ce78d91177953edc.png" alt="user_dp" class="user-dp"/><p>User</p></div></div><div id="tasks"></div><div id="description"></div><div id="footer"><p>Made by <a href="https://github.com/syafaatsaat">@syafaat_saat</a></p></div></div><dialog id="project-dialog"><form id="project-form" class="project-form"><h1 id="project-form-header">New Project</h1><input type="hidden" name="projectID" id="hidden-project-id"/><div class="form-col"><label for="project-title">Title</label> <input id="project-title" name="title" placeholder="New Project"/></div><div class="form-row"><button type="button" id="cancel-project-btn">Cancel</button> <button type="submit" id="create-project-btn">Create</button></div></form></dialog><dialog id="task-dialog"><form id="task-form" class="task-form"><h1 id="task-form-header">New Task</h1><input type="hidden" name="taskID" id="hidden-task-id"/><div class="form-col"><label for="task-title">Title</label> <input id="task-title" name="title" placeholder="New Task"/></div><div class="form-col"><label for="task-description">Description</label> <input id="task-description" name="description"/></div><div class="form-row"><div class="form-col"><label for="duedate">Due Date</label> <input type="date" id="duedate" name="duedate"/></div><div class="form-col"><label for="priority">Priority</label> <select name="priority" id="priority"><option value="low">Low</option><option value="medium">Medium</option><option value="high">High</option></select></div></div><div class="form-row"><button type="button" id="cancel-task-btn">Cancel</button> <button type="submit" id="create-task-btn">Create</button></div></form></dialog><dialog id="delete-dialog" class="delete-dialog"><div class="delete-container"><p>Are you sure you want to delete the <span id="delete-title"></span> <span id="delete-type"></span>?</p><div class="form-row"><button id="delete-close-btn">No</button> <button id="delete-confirm-btn">Yes</button></div></div></dialog></body></html>
